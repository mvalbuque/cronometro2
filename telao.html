<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Telão - Câmara de Limoeiro</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="telao">

<h1>CÂMARA MUNICIPAL DE LIMOEIRO</h1>

<div id="timer">00:00</div>

<script>
setInterval(() => {
    let tempo = localStorage.getItem("tempo") || 0;

    let min = Math.floor(tempo / 60);
    let seg = tempo % 60;

    document.getElementById("timer").innerText =
        String(min).padStart(2, '0') + ":" +
        String(seg).padStart(2, '0');

}, 500);
</script>

</body>
</html>
